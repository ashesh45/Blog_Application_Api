<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="spinner-overlay" id="spinner">
    <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
</div>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 p-0 sidebar">
            <div class="p-3 text-white text-center fw-bold fs-5 border-bottom border-secondary">
                <i class="bi bi-journal-text"></i> BlogApp
            </div>
            <nav class="nav flex-column mt-2">
                <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a class="nav-link active" href="/users.html"><i class="bi bi-people"></i> Users</a>
                <a class="nav-link" href="/categories.html"><i class="bi bi-tags"></i> Categories</a>
                <a class="nav-link" href="/posts.html"><i class="bi bi-file-text"></i> Posts</a>
            </nav>
        </div>
        <div class="col-md-10 main-content">
            <div class="page-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0"><i class="bi bi-people"></i> Users</h4>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openCreateModal()">
                    <i class="bi bi-plus-lg"></i> Add User
                </button>
            </div>
            <div class="card p-3">
                <table class="table table-hover" id="userTable">
                    <thead>
                        <tr><th>#</th><th>Name</th><th>Email</th><th>About</th><th style="width:120px">Actions</th></tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="userModalTitle">Add User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="userName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="userEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="userPassword" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">About</label>
                        <textarea class="form-control" id="userAbout" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
const userModal = new bootstrap.Modal(document.getElementById('userModal'));
let editingUserId = null;

function showSpinner() { document.getElementById('spinner').style.display = 'flex'; }
function hideSpinner() { document.getElementById('spinner').style.display = 'none'; }

async function loadUsers() {
    showSpinner();
    try {
        const users = await API.users.getAll();
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';
        users.forEach((u, i) => {
            const row = tbody.insertRow();
            row.innerHTML = `<td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.about || '-'}</td>
<td>
<button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${u.id})"><i class="bi bi-pencil"></i></button>
<button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})"><i class="bi bi-trash"></i></button>
</td>`;
        });
    } catch (e) { alert('Error loading users: ' + e.message); }
    finally { hideSpinner(); }
}

function openCreateModal() {
    editingUserId = null;
    document.getElementById('userModalTitle').textContent = 'Add User';
    document.getElementById('userForm').reset();
    document.getElementById('userId').value = '';
    userModal.show();
}

async function openEditModal(id) {
    editingUserId = id;
    document.getElementById('userModalTitle').textContent = 'Edit User';
    try {
        const u = await API.users.getById(id);
        document.getElementById('userId').value = u.id;
        document.getElementById('userName').value = u.name;
        document.getElementById('userEmail').value = u.email;
        document.getElementById('userPassword').value = '';
        document.getElementById('userAbout').value = u.about || '';
        userModal.show();
    } catch (e) { alert('Error: ' + e.message); }
}

async function saveUser() {
    const data = {
        name: document.getElementById('userName').value,
        email: document.getElementById('userEmail').value,
        password: document.getElementById('userPassword').value,
        about: document.getElementById('userAbout').value
    };
    try {
        if (editingUserId) {
            await API.users.update(editingUserId, data);
        } else {
            await API.users.create(data);
        }
        userModal.hide();
        loadUsers();
    } catch (e) { alert('Error saving user: ' + e.message); }
}

async function deleteUser(id) {
    if (!confirm('Delete this user?')) return;
    try {
        await API.users.delete(id);
        loadUsers();
    } catch (e) { alert('Error deleting user: ' + e.message); }
}

loadUsers();
</script>
</body>
</html>
