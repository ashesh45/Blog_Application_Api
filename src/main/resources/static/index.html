<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="spinner-overlay" id="spinner">
    <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
</div>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 p-0 sidebar">
            <div class="p-3 text-white text-center fw-bold fs-5 border-bottom border-secondary">
                <i class="bi bi-journal-text"></i> BlogApp
            </div>
            <nav class="nav flex-column mt-2">
                <a class="nav-link active" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a class="nav-link" href="/users.html"><i class="bi bi-people"></i> Users</a>
                <a class="nav-link" href="/categories.html"><i class="bi bi-tags"></i> Categories</a>
                <a class="nav-link" href="/posts.html"><i class="bi bi-file-text"></i> Posts</a>
            </nav>
        </div>
        <div class="col-md-10 main-content">
            <div class="page-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0"><i class="bi bi-speedometer2"></i> Dashboard</h4>
                <span class="text-muted" id="currentDate"></span>
            </div>
            <div class="row mb-4" id="statsRow">
                <div class="col-md-4 mb-3">
                    <div class="stat-card d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">Total Users</h6>
                            <h2 class="mb-0" id="totalUsers">0</h2>
                        </div>
                        <i class="bi bi-people fs-1 opacity-50"></i>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="stat-card d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">Total Categories</h6>
                            <h2 class="mb-0" id="totalCategories">0</h2>
                        </div>
                        <i class="bi bi-tags fs-1 opacity-50"></i>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="stat-card d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">Total Posts</h6>
                            <h2 class="mb-0" id="totalPosts">0</h2>
                        </div>
                        <i class="bi bi-file-text fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="card p-3">
                        <h6><i class="bi bi-clock-history"></i> Recent Posts</h6>
                        <table class="table table-sm mt-2" id="recentPostsTable">
                            <thead><tr><th>Title</th><th>Author</th><th>Date</th></tr></thead>
                            <tbody id="recentPostsBody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <div class="card p-3">
                        <h6><i class="bi bi-bar-chart"></i> Quick Actions</h6>
                        <div class="d-grid gap-2 mt-3">
                            <a href="/posts.html" class="btn btn-outline-primary text-start"><i class="bi bi-plus-circle"></i> Create New Post</a>
                            <a href="/users.html" class="btn btn-outline-success text-start"><i class="bi bi-person-plus"></i> Manage Users</a>
                            <a href="/categories.html" class="btn btn-outline-info text-start"><i class="bi bi-tag"></i> Manage Categories</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
async function loadStats() {
    try {
        const [users, cats, posts] = await Promise.all([
            API.users.getAll(), API.categories.getAll(), API.posts.getAll(0, 5)
        ]);
        document.getElementById('totalUsers').textContent = users.length;
        document.getElementById('totalCategories').textContent = cats.length;
        document.getElementById('totalPosts').textContent = posts.totalElements;
        const tbody = document.getElementById('recentPostsBody');
        tbody.innerHTML = '';
        (posts.content || []).forEach(p => {
            const row = tbody.insertRow();
            row.innerHTML = `<td>${p.title}</td><td>${p.user?.name || 'N/A'}</td><td>${new Date(p.addedDate).toLocaleDateString()}</td>`;
        });
    } catch (e) { console.error(e); }
}
loadStats();
</script>
</body>
</html>
