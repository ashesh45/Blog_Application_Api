<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Posts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="spinner-overlay" id="spinner">
    <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
</div>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 p-0 sidebar">
            <div class="p-3 text-white text-center fw-bold fs-5 border-bottom border-secondary">
                <i class="bi bi-journal-text"></i> BlogApp
            </div>
            <nav class="nav flex-column mt-2">
                <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a class="nav-link" href="/users.html"><i class="bi bi-people"></i> Users</a>
                <a class="nav-link" href="/categories.html"><i class="bi bi-tags"></i> Categories</a>
                <a class="nav-link active" href="/posts.html"><i class="bi bi-file-text"></i> Posts</a>
            </nav>
        </div>
        <div class="col-md-10 main-content">
            <div class="page-header d-flex justify-content-between align-items-center flex-wrap">
                <h4 class="mb-0"><i class="bi bi-file-text"></i> Posts</h4>
                <div>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#postModal" onclick="openCreateModal()">
                        <i class="bi bi-plus-lg"></i> New Post
                    </button>
                </div>
            </div>
            <div class="card p-3 mb-3">
                <div class="row g-2 align-items-end">
                    <div class="col-md-4">
                        <input type="text" class="form-control search-box" id="searchInput" placeholder="Search posts by title...">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-primary w-100" onclick="searchPosts()"><i class="bi bi-search"></i> Search</button>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="filterUser" onchange="filterPosts()">
                            <option value="">All Users</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="filterCategory" onchange="filterPosts()">
                            <option value="">All Categories</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-secondary w-100" onclick="resetFilters()"><i class="bi bi-x-circle"></i> Clear</button>
                    </div>
                </div>
            </div>
            <div class="card p-3">
                <table class="table table-hover" id="postTable">
                    <thead>
                        <tr><th>#</th><th>Title</th><th>Author</th><th>Category</th><th>Date</th><th style="width:120px">Actions</th></tr>
                    </thead>
                    <tbody id="postTableBody"></tbody>
                </table>
                <nav>
                    <ul class="pagination justify-content-center mb-0" id="pagination"></ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="postModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="postModalTitle">New Post</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="postForm">
                    <input type="hidden" id="postId">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" id="postTitle" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Content</label>
                        <textarea class="form-control" id="postContent" rows="4" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">User</label>
                            <select class="form-select" id="postUser" required>
                                <option value="">Select User</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="postCategory" required>
                                <option value="">Select Category</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="savePost()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
const postModal = new bootstrap.Modal(document.getElementById('postModal'));
let editingPostId = null;
let currentPage = 0;
let allPosts = [];
let allUsers = [];
let allCategories = [];

function showSpinner() { document.getElementById('spinner').style.display = 'flex'; }
function hideSpinner() { document.getElementById('spinner').style.display = 'none'; }

async function loadLookups() {
    try {
        [allUsers, allCategories] = await Promise.all([API.users.getAll(), API.categories.getAll()]);
        const userSelects = ['postUser', 'filterUser'];
        userSelects.forEach(id => {
            const sel = document.getElementById(id);
            sel.innerHTML = '<option value="">' + (id === 'postUser' ? 'Select User' : 'All Users') + '</option>';
            allUsers.forEach(u => { sel.innerHTML += `<option value="${u.id}">${u.name}</option>`; });
        });
        const catSelects = ['postCategory', 'filterCategory'];
        catSelects.forEach(id => {
            const sel = document.getElementById(id);
            sel.innerHTML = '<option value="">' + (id === 'postCategory' ? 'Select Category' : 'All Categories') + '</option>';
            allCategories.forEach(c => { sel.innerHTML += `<option value="${c.categoryId}">${c.categoryTitle}</option>`; });
        });
    } catch (e) { console.error('Error loading lookups:', e); }
}

async function loadPosts(page = 0) {
    showSpinner();
    currentPage = page;
    try {
        const res = await API.posts.getAll(page, 10, 'postId', 'desc');
        allPosts = res.content || [];
        renderPosts(allPosts);
        renderPagination(res);
    } catch (e) { alert('Error loading posts: ' + e.message); }
    finally { hideSpinner(); }
}

function renderPosts(posts) {
    const tbody = document.getElementById('postTableBody');
    tbody.innerHTML = '';
    if (posts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No posts found</td></tr>';
        return;
    }
    posts.forEach(p => {
        const row = tbody.insertRow();
        row.innerHTML = `<td>${p.postId}</td><td>${p.title}</td><td>${p.user?.name || 'N/A'}</td>
<td><span class="badge badge-category">${p.category?.categoryTitle || 'N/A'}</span></td>
<td>${p.addedDate ? new Date(p.addedDate).toLocaleDateString() : '-'}</td>
<td>
<button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${p.postId})"><i class="bi bi-pencil"></i></button>
<button class="btn btn-sm btn-outline-danger" onclick="deletePost(${p.postId})"><i class="bi bi-trash"></i></button>
</td>`;
    });
}

function renderPagination(res) {
    const ul = document.getElementById('pagination');
    ul.innerHTML = '';
    if (res.totalPages <= 1) return;
    for (let i = 0; i < res.totalPages; i++) {
        const li = document.createElement('li');
        li.className = 'page-item' + (i === currentPage ? ' active' : '');
        li.innerHTML = `<a class="page-link" href="javascript:void(0)" onclick="loadPosts(${i})">${i+1}</a>`;
        ul.appendChild(li);
    }
}

async function searchPosts() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) { loadPosts(0); return; }
    showSpinner();
    try {
        const results = await API.posts.search(keyword);
        renderPosts(results);
        document.getElementById('pagination').innerHTML = '';
    } catch (e) { alert('Search failed: ' + e.message); }
    finally { hideSpinner(); }
}

function filterPosts() {
    const userId = document.getElementById('filterUser').value;
    const catId = document.getElementById('filterCategory').value;
    if (!userId && !catId) { loadPosts(0); return; }
    showSpinner();
    const promise = userId ? API.posts.getByUser(userId) : API.posts.getByCategory(catId);
    promise.then(posts => {
        renderPosts(posts);
        document.getElementById('pagination').innerHTML = '';
    }).catch(e => alert('Filter error: ' + e.message)).finally(hideSpinner);
}

function resetFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('filterUser').value = '';
    document.getElementById('filterCategory').value = '';
    loadPosts(0);
}

function openCreateModal() {
    editingPostId = null;
    document.getElementById('postModalTitle').textContent = 'New Post';
    document.getElementById('postForm').reset();
    document.getElementById('postId').value = '';
    postModal.show();
}

async function openEditModal(id) {
    editingPostId = id;
    document.getElementById('postModalTitle').textContent = 'Edit Post';
    try {
        const p = await API.posts.getById(id);
        document.getElementById('postId').value = p.postId;
        document.getElementById('postTitle').value = p.title;
        document.getElementById('postContent').value = p.content;
        document.getElementById('postUser').value = p.user?.id || '';
        document.getElementById('postCategory').value = p.category?.categoryId || '';
        postModal.show();
    } catch (e) { alert('Error: ' + e.message); }
}

async function savePost() {
    const userId = document.getElementById('postUser').value;
    const categoryId = document.getElementById('postCategory').value;
    const data = {
        title: document.getElementById('postTitle').value,
        content: document.getElementById('postContent').value
    };
    if (!userId || !categoryId) { alert('Please select user and category'); return; }
    try {
        if (editingPostId) {
            await API.posts.update(editingPostId, data);
        } else {
            await API.posts.create(userId, categoryId, data);
        }
        postModal.hide();
        loadPosts(currentPage);
    } catch (e) { alert('Error saving post: ' + e.message); }
}

async function deletePost(id) {
    if (!confirm('Delete this post?')) return;
    try { await API.posts.delete(id); loadPosts(currentPage); }
    catch (e) { alert('Error deleting post: ' + e.message); }
}

loadLookups();
loadPosts(0);
</script>
</body>
</html>
