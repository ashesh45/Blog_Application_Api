<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="spinner-overlay" id="spinner">
    <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
</div>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 p-0 sidebar">
            <div class="p-3 text-white text-center fw-bold fs-5 border-bottom border-secondary">
                <i class="bi bi-journal-text"></i> BlogApp
            </div>
            <nav class="nav flex-column mt-2">
                <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a class="nav-link" href="/users.html"><i class="bi bi-people"></i> Users</a>
                <a class="nav-link active" href="/categories.html"><i class="bi bi-tags"></i> Categories</a>
                <a class="nav-link" href="/posts.html"><i class="bi bi-file-text"></i> Posts</a>
            </nav>
        </div>
        <div class="col-md-10 main-content">
            <div class="page-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0"><i class="bi bi-tags"></i> Categories</h4>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#categoryModal" onclick="openCreateModal()">
                    <i class="bi bi-plus-lg"></i> Add Category
                </button>
            </div>
            <div class="card p-3">
                <table class="table table-hover" id="categoryTable">
                    <thead>
                        <tr><th>#</th><th>Title</th><th>Description</th><th style="width:120px">Actions</th></tr>
                    </thead>
                    <tbody id="categoryTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="categoryModalTitle">Add Category</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="categoryForm">
                    <input type="hidden" id="categoryId">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" id="categoryTitle" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="categoryDescription" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveCategory()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
const categoryModal = new bootstrap.Modal(document.getElementById('categoryModal'));
let editingCategoryId = null;

function showSpinner() { document.getElementById('spinner').style.display = 'flex'; }
function hideSpinner() { document.getElementById('spinner').style.display = 'none'; }

async function loadCategories() {
    showSpinner();
    try {
        const cats = await API.categories.getAll();
        const tbody = document.getElementById('categoryTableBody');
        tbody.innerHTML = '';
        cats.forEach((c, i) => {
            const row = tbody.insertRow();
            row.innerHTML = `<td>${c.categoryId}</td><td>${c.categoryTitle}</td><td>${c.categoryDescription || '-'}</td>
<td>
<button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${c.categoryId})"><i class="bi bi-pencil"></i></button>
<button class="btn btn-sm btn-outline-danger" onclick="deleteCategory(${c.categoryId})"><i class="bi bi-trash"></i></button>
</td>`;
        });
    } catch (e) { alert('Error loading categories: ' + e.message); }
    finally { hideSpinner(); }
}

function openCreateModal() {
    editingCategoryId = null;
    document.getElementById('categoryModalTitle').textContent = 'Add Category';
    document.getElementById('categoryForm').reset();
    document.getElementById('categoryId').value = '';
    categoryModal.show();
}

async function openEditModal(id) {
    editingCategoryId = id;
    document.getElementById('categoryModalTitle').textContent = 'Edit Category';
    try {
        const c = await API.categories.getById(id);
        document.getElementById('categoryId').value = c.categoryId;
        document.getElementById('categoryTitle').value = c.categoryTitle;
        document.getElementById('categoryDescription').value = c.categoryDescription || '';
        categoryModal.show();
    } catch (e) { alert('Error: ' + e.message); }
}

async function saveCategory() {
    const data = {
        categoryTitle: document.getElementById('categoryTitle').value,
        categoryDescription: document.getElementById('categoryDescription').value
    };
    try {
        if (editingCategoryId) {
            await API.categories.update(editingCategoryId, data);
        } else {
            await API.categories.create(data);
        }
        categoryModal.hide();
        loadCategories();
    } catch (e) { alert('Error saving category: ' + e.message); }
}

async function deleteCategory(id) {
    if (!confirm('Delete this category?')) return;
    try {
        await API.categories.delete(id);
        loadCategories();
    } catch (e) { alert('Error deleting category: ' + e.message); }
}

loadCategories();
</script>
</body>
</html>
